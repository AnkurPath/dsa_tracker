<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DSA Tracker{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: { DEFAULT: '#1a2332', soft: '#2d3a4f', muted: '#5c6b82' },
            paper: { DEFAULT: '#f4f6f9', elev: '#ffffff', wash: '#e8edf4' },
            due: { DEFAULT: '#c45c26', soft: '#f3e0d4' },
            ok: { DEFAULT: '#1f6b4a', soft: '#d8eee4' },
            wait: { DEFAULT: '#3d5a80', soft: '#dce6f0' },
          },
          fontFamily: {
            display: ['Syne', 'system-ui', 'sans-serif'],
            sans: ['Figtree', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            soft: '0 1px 2px rgba(26,35,50,0.04), 0 8px 24px rgba(26,35,50,0.06)',
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body {
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, #dce8f5 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 0%, #f3e0d4 0%, transparent 45%),
        linear-gradient(180deg, #eef2f7 0%, #f4f6f9 40%, #e8edf4 100%);
      min-height: 100vh;
    }
    .htmx-request.htmx-indicator,
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease; }
    #leetcode-sync-loader.htmx-indicator,
    #email-send-loader.htmx-indicator { display: none; opacity: 1; }
    #leetcode-sync-loader.htmx-request,
    .htmx-request #leetcode-sync-loader,
    #email-send-loader.htmx-request,
    .htmx-request #email-send-loader { display: flex; }
    form.htmx-request button[type="submit"].email-send-btn {
      pointer-events: none;
      opacity: 0.7;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="font-sans text-ink antialiased">
  <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10 lg:px-8">
    <header class="mb-8 lg:mb-10">
      <div class="flex items-start justify-between gap-4">
        <a href="/" class="group min-w-0">
          <p class="font-display text-4xl font-extrabold tracking-tight text-ink sm:text-5xl">
            DSA Tracker
          </p>
          <p class="mt-2 max-w-xl text-ink-muted">
            Frequent reviews until you solve it yourself — then spaced, then random.
          </p>
        </a>
        {% if user %}
        <div class="flex shrink-0 flex-col items-end gap-2 pt-1">
          <p class="text-right text-sm text-ink-muted">
            <span class="font-semibold text-ink">{{ user.email or user.display_name }}</span>
          </p>
          <div class="flex items-center gap-2">
            <a
              href="/session"
              class="rounded-lg border border-paper-wash bg-paper-elev px-3 py-1.5 text-sm font-semibold text-due transition hover:border-due/30"
            >Session</a>
            <form method="post" action="/logout">
              <button
                type="submit"
                class="rounded-lg border border-paper-wash bg-paper-elev px-3 py-1.5 text-sm font-medium text-ink-muted transition hover:border-ink/20 hover:text-ink"
              >Log out</button>
            </form>
          </div>
        </div>
        {% endif %}
      </div>
    </header>

    <div id="flash"></div>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
