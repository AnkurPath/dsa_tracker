{% extends "base.html" %}

{% block title %}Sign up · DSA Tracker{% endblock %}

{% block content %}
<section class="mx-auto max-w-md">
  <h1 class="font-display text-2xl font-bold text-ink">Create account</h1>
  <p class="mt-1 text-sm text-ink-muted">Sign up with email — your problems stay private to you.</p>

  {% if error %}
  <div class="mt-5 rounded-lg border border-due/30 bg-due-soft px-4 py-3 text-sm text-due" role="alert">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/register" class="mt-6 space-y-4 rounded-xl bg-paper-elev p-5 shadow-soft sm:p-6">
    <div>
      <label for="email" class="mb-1.5 block text-sm font-medium text-ink">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        required
        autocomplete="email"
        value="{{ email or '' }}"
        placeholder="you@example.com"
        class="w-full rounded-lg border border-paper-wash bg-paper px-3.5 py-2.5 text-ink outline-none ring-ink/20 focus:ring-2"
      />
    </div>
    <div>
      <label for="password" class="mb-1.5 block text-sm font-medium text-ink">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        required
        minlength="6"
        autocomplete="new-password"
        class="w-full rounded-lg border border-paper-wash bg-paper px-3.5 py-2.5 text-ink outline-none ring-ink/20 focus:ring-2"
      />
    </div>
    <div>
      <label for="password_confirm" class="mb-1.5 block text-sm font-medium text-ink">Confirm password</label>
      <input
        type="password"
        id="password_confirm"
        name="password_confirm"
        required
        minlength="6"
        autocomplete="new-password"
        class="w-full rounded-lg border border-paper-wash bg-paper px-3.5 py-2.5 text-ink outline-none ring-ink/20 focus:ring-2"
      />
    </div>
    <button
      type="submit"
      class="w-full rounded-lg bg-due px-4 py-2.5 text-sm font-semibold text-white transition hover:brightness-110"
    >Sign up</button>
  </form>

  <p class="mt-5 text-center text-sm text-ink-muted">
    Already have an account?
    <a href="/login" class="font-semibold text-ink underline decoration-ink/20 underline-offset-2 hover:decoration-ink">Log in</a>
  </p>
</section>
{% endblock %}
