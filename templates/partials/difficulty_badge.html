{% if problem.difficulty %}
  {% if problem.difficulty.value == 'Easy' %}
    <span class="rounded bg-ok-soft px-2 py-0.5 text-xs font-semibold text-ok">Easy</span>
  {% elif problem.difficulty.value == 'Medium' %}
    <span class="rounded bg-due-soft px-2 py-0.5 text-xs font-semibold text-due">Medium</span>
  {% else %}
    <span class="rounded bg-red-100 px-2 py-0.5 text-xs font-semibold text-red-700">Hard</span>
  {% endif %}
{% endif %}
