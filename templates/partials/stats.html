<div class="mb-8 grid grid-cols-2 gap-3 sm:grid-cols-4 lg:gap-4">
  <div class="rounded-xl bg-paper-elev px-4 py-4 shadow-soft sm:px-5">
    <p class="text-xs font-medium uppercase tracking-wide text-ink-muted">Total</p>
    <p class="mt-1 font-display text-3xl font-bold text-ink">{{ stats.total }}</p>
  </div>
  <div class="rounded-xl bg-paper-elev px-4 py-4 shadow-soft sm:px-5">
    <p class="text-xs font-medium uppercase tracking-wide text-due">Due</p>
    <p class="mt-1 font-display text-3xl font-bold text-due">{{ stats.due }}</p>
  </div>
  <div class="rounded-xl bg-paper-elev px-4 py-4 shadow-soft sm:px-5">
    <p class="text-xs font-medium uppercase tracking-wide text-wait">Upcoming</p>
    <p class="mt-1 font-display text-3xl font-bold text-wait">{{ stats.upcoming }}</p>
  </div>
  <div class="rounded-xl bg-paper-elev px-4 py-4 shadow-soft sm:px-5">
    <p class="text-xs font-medium uppercase tracking-wide text-ok">Mastered</p>
    <p class="mt-1 font-display text-3xl font-bold text-ok">{{ stats.mastered }}</p>
  </div>
</div>
