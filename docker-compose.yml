services:
  web:
    # Prefer the published image; `build` is used for local development
    image: ghcr.io/ankurpath/dsa_tracker:latest
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
